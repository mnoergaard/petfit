name: Integration Tests

on:
  push:
    branches: [main, apptainer_adventures]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_docker:
        description: 'Run Docker container tests'
        required: false
        type: boolean
        default: true
      run_apptainer:
        description: 'Run Apptainer container tests'
        required: false
        type: boolean
        default: true

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  R_LIBS_USER: ${{ github.workspace }}/R-lib

jobs:
  # =========================================================================
  # Job 1: R-native integration tests
  # =========================================================================
  r-native:
    name: R-native integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat

      - name: Install petfit package
        run: |
          Rscript -e "devtools::install()"

      - name: Run integration tests
        env:
          PETFIT_INTEGRATION_TESTS: "true"
          PETFIT_PARALLEL_TESTS: "true"
          PETFIT_INTEGRATION_CACHE: /tmp/petfit_integration
        run: |
          Rscript -e "devtools::test(filter = 'integration', stop_on_failure = TRUE)"

  # =========================================================================
  # Job 2: Docker container tests
  # =========================================================================
  docker:
    name: Docker container tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_docker == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: mathesong/petfit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker integration tests
        env:
          PETFIT_INTEGRATION_TESTS: "true"
          PETFIT_DOCKER_TESTS: "true"
          PETFIT_PARALLEL_TESTS: "true"
          PETFIT_INTEGRATION_CACHE: /tmp/petfit_integration
        run: |
          Rscript -e "devtools::test(filter = 'integration.*docker', stop_on_failure = TRUE)"

  # =========================================================================
  # Job 3: Apptainer container tests
  # =========================================================================
  apptainer:
    name: Apptainer container tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_apptainer == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (for Apptainer to use)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: mathesong/petfit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Apptainer integration tests
        env:
          PETFIT_INTEGRATION_TESTS: "true"
          PETFIT_APPTAINER_TESTS: "true"
          PETFIT_PARALLEL_TESTS: "true"
          PETFIT_INTEGRATION_CACHE: /tmp/petfit_integration
        run: |
          Rscript -e "devtools::test(filter = 'integration.*apptainer', stop_on_failure = TRUE)"
